name: Auto Tag and Release

on:
  push:
    branches:
      - main
      -  fix/release-fix

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Buf
        uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Buf Lint
        uses: bufbuild/buf-lint-action@v1

      - name: Clean and Generate
        run: |
          find . -name "*.pb.go" -type f -delete
          find . -name "*.connect.go" -type f -delete
          buf generate

      # STEP 1: Commit and Push the generated code first
      - name: Commit generated code
        id: auto_commit
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: generate protobuf code [skip ci]"
          file_pattern: "**/*.go **/*.json"

      # STEP 2: Make sure the runner is on the latest commit before tagging
      - name: Pull latest changes
        run: |
          git checkout main
          git pull origin main
          echo "HEAD is now at: $(git rev-parse HEAD)"
          
      # STEP 3: Tag the NEW commit created by the step above
      - name: Bump version and push tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          commit_sha: ${{ steps.auto_commit.outputs.commit_hash }}

      - name: Create a GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.tag_version.outputs.new_tag }}
          name: Release ${{ steps.tag_version.outputs.new_tag }}
          body: ${{ steps.tag_version.outputs.changelog }}
          token: ${{ secrets.GITHUB_TOKEN }}
