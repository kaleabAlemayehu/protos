syntax = "proto3";

package auth.v1;

import "buf/validate/validate.proto";


service AuthService {
  rpc SendOTP(SendOTPRequest) returns (SendOTPResponse) {}
  rpc VerifyOTP(VerifyOTPRequest) returns (VerifyOTPResponse){}
  rpc RegisterPIN(RegisterPINRequest) returns(RegisterPINResponse){}
  rpc Unlock(UnlockRequest) returns(UnlockResponse){}
}

message UnlockRequest {
  uint64 pin = 1 [
  (buf.validate.field).uint64 = { gte: 100000, lte: 999999,}, 
  (buf.validate.field).required = true];
  string refresh_token = 2 [
  (buf.validate.field).required = true];
}

message UnlockResponse{
  string status = 1[
  (buf.validate.field).required = true];
  string access_token = 2 [
  (buf.validate.field).required = true];
  string refresh_token = 3 [
  (buf.validate.field).required = true];
}

message RegisterPINRequest {
  uint64 pin = 1 [
  (buf.validate.field).uint64 = { gte: 100000, lte: 999999,}, 
  (buf.validate.field).required = true];
}

message RegisterPINResponse {
  string status = 1[
  (buf.validate.field).required = true];
  string access_token = 2 [
  (buf.validate.field).required = true];
  string refresh_token = 3 [
  (buf.validate.field).required = true];
}

message SendOTPRequest {
  uint64 mobile_number = 1 [
  (buf.validate.field).uint64 = { gte: 100000000, lte: 999999999,}, 
  (buf.validate.field).required = true];
}

message SendOTPResponse {
  bool success = 1;
  string session_id = 2;
}

message VerifyOTPRequest {
  uint64 otp= 1[
  (buf.validate.field).uint64 = { gte:100000, lte:999999,}, 
  (buf.validate.field).required = true];
  string session_id = 2[
  (buf.validate.field).string.uuid = true,
  (buf.validate.field).required = true];
}

message VerifyOTPResponse {
string registration_token = 1;
}



